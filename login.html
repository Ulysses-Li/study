<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | Louis Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-1">Admin Login</h1>
            <p class="text-muted mb-4">請登入後管理學習資料。</p>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input id="email" class="form-control" type="email" autocomplete="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input id="password" class="form-control" type="password" autocomplete="current-password" required>
              </div>
              <button id="loginButton" class="btn btn-primary w-100" type="submit">登入</button>
            </form>

            <div class="d-grid mt-3">
              <a class="btn btn-outline-secondary" href="index.html">回首頁</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">系統訊息</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div id="toastBody" class="toast-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { isAdminUser, loginWithEmail, waitForAuthUser } from "./js/firebase-auth.js";

    const loginForm = document.getElementById("loginForm");
    const loginButton = document.getElementById("loginButton");
    const toast = new bootstrap.Toast(document.getElementById("appToast"));

    function showToast(message) {
      document.getElementById("toastBody").textContent = message;
      toast.show();
    }

    /**
     * 檢查既有登入狀態。
     *
     * 輸入：
     * 無
     *
     * 輸出：
     * 依登入狀態導向頁面
     *
     * 流程：
     * 1. 等待 Firebase Auth
     * 2. 已登入 Admin 時前往 Admin.html
     * 3. 已登入非 Admin 時前往 index.html
     */
    async function redirectIfSignedIn() {
      try {
        const user = await waitForAuthUser();
        if (!user) return;

        window.location.href = isAdminUser(user) ? "Admin.html" : "index.html";
      } catch (error) {
        console.error("檢查登入狀態失敗", error);
        showToast("登入狀態檢查失敗，請稍後再試。");
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;

      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const user = await loginWithEmail(email, password);

        if (!isAdminUser(user)) {
          showToast("此帳號沒有 Admin 權限。");
          window.location.href = "index.html";
          return;
        }

        showToast("登入成功。");
        window.location.href = "Admin.html";
      } catch (error) {
        console.error("Firebase Authentication 登入失敗", error);
        showToast("登入失敗，請確認 Email / Password。");
      } finally {
        loginButton.disabled = false;
      }
    });

    redirectIfSignedIn();
  </script>
</body>

</html>
