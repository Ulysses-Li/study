<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Louis Study Tracker</title>
  <link rel="icon" href="./Jimmore_logo.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --app-bg: #f5f7fb;
      --surface: #ffffff;
      --border: #d9e2ec;
      --text-main: #172033;
      --text-muted: #667085;
      --brand: #2563eb;
      --brand-soft: #e8efff;
      --success-soft: #e8f8ef;
      --warning-soft: #fff6d8;
    }

    body {
      min-height: 100vh;
      background: var(--app-bg);
      color: var(--text-main);
    }

    .app-shell {
      max-width: 1180px;
    }

    .app-header {
      border-bottom: 1px solid var(--border);
    }

    .summary-card,
    .filter-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .content-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .summary-card {
      min-height: 104px;
    }

    .summary-label {
      color: var(--text-muted);
      font-size: .82rem;
      font-weight: 600;
    }

    .summary-value {
      font-size: 2rem;
      line-height: 1;
    }

    .calendar {
      table-layout: fixed;
    }

    .calendar th,
    .calendar td {
      min-width: 132px;
      height: 112px;
      vertical-align: top;
    }

    .calendar th {
      height: 82px;
      color: var(--text-muted);
      font-size: .85rem;
      font-weight: 700;
      text-align: center;
      vertical-align: middle;
    }

    .day-cell {
      cursor: pointer;
      transition: background-color .15s ease, outline-color .15s ease;
    }

    .day-cell:hover {
      background: #f0f4f8;
    }

    .day-cell.is-selected {
      outline: 3px solid var(--brand);
      outline-offset: -3px;
    }

    .today {
      background: var(--warning-soft);
    }

    .day-num {
      font-weight: 700;
      text-align: center;
    }

    .sun {
      color: #dc3545;
    }

    .sat {
      color: #0d6efd;
    }

    .calendar-pill {
      display: block;
      margin-top: 6px;
      border-radius: 6px;
      padding: 5px 6px;
      font-size: .82rem;
      line-height: 1.25;
      overflow-wrap: anywhere;
      text-align: left;
    }

    .video-pill {
      background: #f1f3f5;
      color: #1f2937;
    }

    .note-pill {
      background: #e7f1ff;
      border: 1px solid #b6d4fe;
      color: #1f2937;
    }

    .video-card {
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .video-title {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .training-section {
      margin-top: 48px;
    }

    .training-title {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .training-count {
      color: var(--text-muted);
      font-size: .95rem;
    }

    .training-item-title {
      color: #111827;
      font-size: 1.22rem;
      font-weight: 700;
      line-height: 1.22;
      min-height: 3rem;
      overflow-wrap: anywhere;
    }

    .training-frame {
      background: #000;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, .16);
      overflow: hidden;
    }

    .training-meta {
      color: var(--text-muted);
      font-size: .9rem;
      line-height: 1.45;
    }

    .training-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .progress {
      background: #e7edf4;
    }

    .empty-state {
      border: 1px dashed #c9d4e2;
      border-radius: 8px;
      color: var(--text-muted);
      padding: 16px;
      text-align: center;
    }

    @media (max-width: 767.98px) {
      .calendar th,
      .calendar td {
        min-width: 84px;
        height: 104px;
      }

      .calendar th {
        height: 60px;
      }

      .summary-value {
        font-size: 1.7rem;
      }

      .training-title {
        font-size: 1.45rem;
      }

      .training-item-title {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <header class="app-header bg-white">
    <div class="container-fluid app-shell px-3 px-lg-4 py-3">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <h1 class="h3 mb-1">Louis Study Tracker</h1>
          <p id="dataStatus" class="text-secondary mb-0">正在載入學習資料...</p>
        </div>
        <a class="btn btn-outline-secondary" href="login.html">管理登入</a>
      </div>
    </div>
  </header>

  <main class="container-fluid app-shell px-3 px-lg-4 py-4">
    <section class="row g-3 mb-4" aria-label="學習摘要">
      <div class="col-6 col-lg-3">
        <div class="summary-card p-3">
          <div class="summary-label">影片總數</div>
          <div id="totalVideosCount" class="summary-value fw-bold">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="summary-card p-3">
          <div class="summary-label">已完成影片</div>
          <div id="completedVideosCount" class="summary-value fw-bold text-success">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="summary-card p-3">
          <div class="summary-label">本月排程</div>
          <div id="monthVideosCount" class="summary-value fw-bold text-primary">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="summary-card p-3">
          <div class="summary-label">筆記總數</div>
          <div id="notesCount" class="summary-value fw-bold text-info">0</div>
        </div>
      </div>
    </section>

    <section class="filter-panel p-3 mb-4" aria-label="篩選工具">
      <div class="row g-2">
        <div class="col-12 col-lg-6">
          <input id="searchText" class="form-control" placeholder="搜尋 title / series / category / tag / note">
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
          <select id="statusFilter" class="form-select" aria-label="狀態篩選">
            <option value="all">所有狀態</option>
            <option value="planned">待安排</option>
            <option value="watching">進行中</option>
            <option value="completed">已完成</option>
          </select>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
          <select id="dateFilter" class="form-select" aria-label="日期篩選">
            <option value="all">所有日期</option>
            <option value="dated">已有日期</option>
            <option value="undated">尚未排程</option>
          </select>
        </div>
      </div>
    </section>

    <div class="row g-4">
      <section class="col-12">
        <div class="content-panel p-3">
          <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
            <button id="prevBtn" class="btn btn-outline-secondary px-4" type="button">← 上個月</button>
            <h2 id="calendarTitle" class="h4 mb-0 text-center"></h2>
            <button id="nextBtn" class="btn btn-outline-secondary px-4" type="button">下個月 →</button>
          </div>

          <div class="table-responsive">
            <table class="table table-bordered calendar bg-white mb-3">
              <thead class="table-light">
                <tr>
                  <th class="sun">日</th>
                  <th>一</th>
                  <th>二</th>
                  <th>三</th>
                  <th>四</th>
                  <th>五</th>
                  <th class="sat">六</th>
                </tr>
              </thead>
              <tbody id="calendarBody"></tbody>
            </table>
          </div>

          <div class="text-center">
            <button id="todayBtn" class="btn btn-primary" type="button">回到今天</button>
          </div>
        </div>
      </section>

      <aside class="col-12">
        <div class="row g-4">
          <section class="col-12 col-lg-6">
            <div class="content-panel p-3 h-100">
          <h2 id="selectedDateTitle" class="h5 mb-3">今日影片</h2>
          <div id="dayVideosList"></div>
            </div>
          </section>

          <section class="col-12 col-lg-6">
            <div class="content-panel p-3 h-100">
          <h2 class="h5 mb-3">當日筆記</h2>
          <div id="dayNotesList"></div>
            </div>
          </section>
        </div>
      </aside>
    </div>

    <section class="training-section">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h2 class="training-title mb-0">📺 每週訓練影片</h2>
        <span id="resultCount" class="training-count"></span>
      </div>
      <div id="filteredVideosList" class="row g-4"></div>
    </section>
  </main>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">Study Tracker</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div id="toastBody" class="toast-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loadNotes, loadVideos } from "./js/firestore-service.js";

    const today = new Date();
    const state = {
      year: today.getFullYear(),
      month: today.getMonth(),
      today,
      selectedDate: toDateKey(today.getFullYear(), today.getMonth(), today.getDate()),
      videos: [],
      notes: [],
      filteredVideos: [],
      filteredNotes: [],
      byDate: {}
    };

    const toast = new bootstrap.Toast(document.getElementById("appToast"));

    function showToast(message) {
      document.getElementById("toastBody").textContent = message;
      toast.show();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (match) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function toDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function normalizeDateKey(value) {
      if (!value) return "";
      if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return toDateKey(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function clampPercent(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number)) return 0;
      return Math.min(100, Math.max(0, number));
    }

    function normalizeToWatchUrl(url) {
      const text = String(url || "");
      const embedMatch = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]+)/);
      if (embedMatch) return `https://www.youtube.com/watch?v=${embedMatch[1]}`;

      const shortMatch = text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (shortMatch) return `https://www.youtube.com/watch?v=${shortMatch[1]}`;

      return text || "#";
    }

    function normalizeToEmbedUrl(url) {
      const text = String(url || "");
      const embedMatch = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]+)/);
      if (embedMatch) return `https://www.youtube.com/embed/${embedMatch[1]}`;

      const shortMatch = text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (shortMatch) return `https://www.youtube.com/embed/${shortMatch[1]}`;

      const watchMatch = text.match(/[?&]v=([a-zA-Z0-9_-]+)/);
      if (watchMatch) return `https://www.youtube.com/embed/${watchMatch[1]}`;

      return "";
    }

    function getVideoTitle(video) {
      return video.title || video.name || "未命名影片";
    }

    function getStatusLabel(status) {
      return {
        planned: "待安排",
        watching: "進行中",
        completed: "已完成"
      }[status] || status || "待安排";
    }

    function getVideoSearchText(video) {
      return [
        getVideoTitle(video),
        video.series,
        video.category,
        video.url,
        video.status,
        video.note,
        Array.isArray(video.tags) ? video.tags.join(" ") : ""
      ].join(" ").toLowerCase();
    }

    function getNoteSearchText(note) {
      return [note.title, note.content, note.date].join(" ").toLowerCase();
    }

    function getSelectedMonthPrefix() {
      return `${state.year}-${String(state.month + 1).padStart(2, "0")}`;
    }

    function getFilteredVideos() {
      const queryText = document.getElementById("searchText").value.trim().toLowerCase();
      const statusFilter = document.getElementById("statusFilter").value;
      const dateFilter = document.getElementById("dateFilter").value;

      let videos = [...state.videos];
      if (statusFilter !== "all") videos = videos.filter((video) => video.status === statusFilter);
      if (dateFilter === "dated") videos = videos.filter((video) => normalizeDateKey(video.date));
      if (dateFilter === "undated") videos = videos.filter((video) => !normalizeDateKey(video.date));
      if (queryText) videos = videos.filter((video) => getVideoSearchText(video).includes(queryText));

      return videos.sort((a, b) => {
        const dateCompare = String(normalizeDateKey(a.date)).localeCompare(String(normalizeDateKey(b.date)));
        if (dateCompare !== 0) return dateCompare;
        return String(a.series || "").localeCompare(String(b.series || ""), undefined, { numeric: true });
      });
    }

    function getFilteredNotes() {
      const queryText = document.getElementById("searchText").value.trim().toLowerCase();
      if (!queryText) return [...state.notes];
      return state.notes.filter((note) => getNoteSearchText(note).includes(queryText));
    }

    function groupByDate() {
      const output = {};

      for (const video of state.filteredVideos) {
        const date = normalizeDateKey(video.date);
        if (!date) continue;
        (output[date] ||= { videos: [], notes: [] }).videos.push(video);
      }

      for (const note of state.filteredNotes) {
        const date = normalizeDateKey(note.date);
        if (!date) continue;
        (output[date] ||= { videos: [], notes: [] }).notes.push(note);
      }

      state.byDate = output;
    }

    function renderStats() {
      const monthPrefix = getSelectedMonthPrefix();
      const monthVideos = state.videos.filter((video) => normalizeDateKey(video.date).startsWith(monthPrefix));

      document.getElementById("totalVideosCount").textContent = state.videos.length;
      document.getElementById("completedVideosCount").textContent = state.videos.filter((video) => video.status === "completed").length;
      document.getElementById("monthVideosCount").textContent = monthVideos.length;
      document.getElementById("notesCount").textContent = state.notes.length;
    }

    function renderCalendar() {
      document.getElementById("calendarTitle").textContent = `${state.year} 年 ${state.month + 1} 月`;
      const body = document.getElementById("calendarBody");
      const firstDay = new Date(state.year, state.month, 1).getDay();
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();

      let html = "<tr>";
      for (let index = 0; index < firstDay; index++) html += "<td></td>";

      for (let day = 1; day <= daysInMonth; day++) {
        const weekday = new Date(state.year, state.month, day).getDay();
        const key = toDateKey(state.year, state.month, day);
        const group = state.byDate[key] || { videos: [], notes: [] };
        const isToday = key === toDateKey(state.today.getFullYear(), state.today.getMonth(), state.today.getDate());
        const isSelected = key === state.selectedDate;

        let className = "day-cell";
        if (weekday === 0) className += " sun";
        if (weekday === 6) className += " sat";
        if (isToday) className += " today";
        if (isSelected) className += " is-selected";

        const videoText = group.videos.length
          ? `<span class="calendar-pill video-pill">${"▶ ".repeat(Math.min(group.videos.length, 4)).trim()}</span>`
          : "";
        const notePreview = group.notes[0]?.content || group.notes[0]?.title || "";
        const noteText = group.notes.length
          ? `<span class="calendar-pill note-pill">${escapeHtml(notePreview || `筆記 ${group.notes.length}`)}</span>`
          : "";

        html += `
          <td class="${className}" data-date="${key}" aria-label="${key}">
            <div class="day-num">${day}</div>
            ${videoText}
            ${noteText}
          </td>
        `;

        if (weekday === 6 && day !== daysInMonth) html += "</tr><tr>";
      }

      const lastDay = new Date(state.year, state.month, daysInMonth).getDay();
      for (let index = lastDay; index < 6; index++) html += "<td></td>";

      body.innerHTML = `${html}</tr>`;
    }

    function renderVideoList(targetId, videos, emptyMessage) {
      const target = document.getElementById(targetId);
      if (!videos.length) {
        target.innerHTML = `<div class="empty-state">${emptyMessage}</div>`;
        return;
      }

      target.innerHTML = videos.map((video) => renderVideoCardHtml(video)).join("");
    }

    function renderDayPanel() {
      const group = state.byDate[state.selectedDate] || { videos: [], notes: [] };
      document.getElementById("selectedDateTitle").textContent = `${state.selectedDate} 影片`;

      renderVideoList("dayVideosList", group.videos, "這一天還沒有排程影片。");

      const notesTarget = document.getElementById("dayNotesList");
      if (!group.notes.length) {
        notesTarget.innerHTML = '<div class="empty-state">這一天還沒有筆記。</div>';
        return;
      }

      notesTarget.innerHTML = group.notes.map((note) => `
        <div class="border-bottom pb-3 mb-3">
          <div class="fw-semibold">${escapeHtml(note.title || "未命名筆記")}</div>
          <div class="text-secondary small mb-2">${escapeHtml(note.date || "")}</div>
          <div>${escapeHtml(note.content || "")}</div>
        </div>
      `).join("");
    }

    function renderFilteredResults() {
      const target = document.getElementById("filteredVideosList");
      document.getElementById("resultCount").textContent = `${state.filteredVideos.length} 筆影片`;

      if (!state.filteredVideos.length) {
        target.innerHTML = '<div class="col-12"><div class="empty-state">沒有符合篩選條件的影片。</div></div>';
        return;
      }

      target.innerHTML = state.filteredVideos.map((video) => `
        <div class="col-12 col-lg-6">
          ${renderTrainingVideoHtml(video)}
        </div>
      `).join("");
    }

    function renderTrainingVideoHtml(video) {
      const title = getVideoTitle(video);
      const watchUrl = normalizeToWatchUrl(video.url);
      const embedUrl = normalizeToEmbedUrl(video.url);
      const progress = clampPercent(video.progress);
      const meta = [
        video.series ? `(${video.series})` : "",
        video.category || "",
        normalizeDateKey(video.date) || "未排日期",
        getStatusLabel(video.status)
      ].filter(Boolean).join(" · ");

      const mediaHtml = embedUrl
        ? `
          <div class="ratio ratio-16x9 training-frame">
            <iframe
              src="${escapeHtml(embedUrl)}"
              title="${escapeHtml(title)}"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen></iframe>
          </div>
        `
        : `
          <div class="ratio ratio-16x9 training-frame d-flex align-items-center justify-content-center text-white">
            <div class="text-center px-3">這筆影片沒有可嵌入的 YouTube 連結。</div>
          </div>
        `;

      return `
        <article class="training-item">
          <h3 class="training-item-title">${escapeHtml(video.series ? `(${video.series}) ${title}` : title)}</h3>
          ${mediaHtml}
          <div class="training-actions mt-3">
            <div>
              <div class="training-meta">${escapeHtml(meta)}</div>
              ${video.note ? `<div class="training-meta">${escapeHtml(video.note)}</div>` : ""}
            </div>
            <a class="btn btn-sm btn-outline-primary flex-shrink-0" href="${escapeHtml(watchUrl)}" target="_blank" rel="noopener">觀看</a>
          </div>
          <div class="progress mt-2" style="height: 6px;" aria-label="進度 ${progress}%">
            <div class="progress-bar" style="width: ${progress}%;"></div>
          </div>
        </article>
      `;
    }

    function renderVideoCardHtml(video) {
      const progress = clampPercent(video.progress);
      const url = normalizeToWatchUrl(video.url);
      const disabledLinkClass = url === "#" ? " disabled" : "";

      return `
        <div class="card video-card h-100">
          <div class="card-body">
            <div class="d-flex justify-content-between gap-2 mb-1">
              <h3 class="h6 video-title mb-0">${escapeHtml(getVideoTitle(video))}</h3>
              <span class="badge text-bg-secondary flex-shrink-0">${escapeHtml(getStatusLabel(video.status))}</span>
            </div>
            <div class="small text-secondary mb-2">${escapeHtml(video.series || "未分類")}${video.category ? ` | ${escapeHtml(video.category)}` : ""}</div>
            <p class="small mb-2">${escapeHtml(video.note || "")}</p>
            <div class="progress mb-2" style="height: 8px;" aria-label="進度 ${progress}%">
              <div class="progress-bar" style="width: ${progress}%;"></div>
            </div>
            <div class="d-flex justify-content-between align-items-center gap-2">
              <span class="small text-secondary">${escapeHtml(normalizeDateKey(video.date) || "尚未排程")}</span>
              <a class="btn btn-sm btn-outline-primary${disabledLinkClass}" href="${escapeHtml(url)}" target="_blank" rel="noopener">觀看</a>
            </div>
          </div>
        </div>
      `;
    }

    function applyFiltersAndRender() {
      state.filteredVideos = getFilteredVideos();
      state.filteredNotes = getFilteredNotes();
      groupByDate();
      renderStats();
      renderCalendar();
      renderDayPanel();
      renderFilteredResults();
    }

    async function initPage() {
      try {
        const [videoResult, noteResult] = await Promise.all([loadVideos(), loadNotes()]);
        state.videos = videoResult.data;
        state.notes = noteResult.data;
        applyFiltersAndRender();

        const fromCache = videoResult.fromCache || noteResult.fromCache;
        document.getElementById("dataStatus").textContent = fromCache ? "目前使用本機快取或範例資料。" : "資料已從 Firestore 載入。";
        if (fromCache) showToast("Firestore 無法讀取，已改用本機快取或範例資料。");
      } catch (error) {
        console.error("載入資料失敗", error);
        document.getElementById("dataStatus").textContent = "載入資料失敗。";
        showToast("載入資料失敗，請檢查 Firebase 設定。");
      }
    }

    document.getElementById("calendarBody").addEventListener("click", (event) => {
      const cell = event.target.closest("td[data-date]");
      if (!cell) return;

      state.selectedDate = cell.dataset.date;
      renderCalendar();
      renderDayPanel();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      state.month -= 1;
      if (state.month < 0) {
        state.month = 11;
        state.year -= 1;
      }
      applyFiltersAndRender();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      state.month += 1;
      if (state.month > 11) {
        state.month = 0;
        state.year += 1;
      }
      applyFiltersAndRender();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      state.year = state.today.getFullYear();
      state.month = state.today.getMonth();
      state.selectedDate = toDateKey(state.today.getFullYear(), state.today.getMonth(), state.today.getDate());
      applyFiltersAndRender();
    });

    document.getElementById("searchText").addEventListener("input", applyFiltersAndRender);
    document.getElementById("statusFilter").addEventListener("change", applyFiltersAndRender);
    document.getElementById("dateFilter").addEventListener("change", applyFiltersAndRender);

    initPage();
  </script>
</body>

</html>
