<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Louis Study Tracker</title>
  <link rel="icon" href="./Jimmore_logo.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }

    .calendar {
      table-layout: fixed;
    }

    .calendar th,
    .calendar td {
      height: 112px;
      vertical-align: top;
    }

    .day-cell {
      cursor: pointer;
    }

    .day-cell:hover {
      background: #f1f3f5;
    }

    .today {
      background: #fff3cd;
    }

    .sun {
      color: #dc3545;
    }

    .sat {
      color: #0d6efd;
    }

    .event-text,
    .note-text {
      margin-top: 6px;
      border-radius: 6px;
      padding: 6px;
      font-size: .85rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .event-text {
      background: #f1f3f5;
    }

    .note-text {
      background: #e7f1ff;
      border: 1px solid #b6d4fe;
    }
  </style>
</head>

<body>
  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h1 class="h3 mb-1">Louis Study Tracker</h1>
        <p id="dataStatus" class="text-muted mb-0">資料載入中...</p>
      </div>
      <a class="btn btn-outline-secondary" href="login.html">Admin</a>
    </div>

    <section class="mb-4" id="calendarSection">
      <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
        <button id="prevBtn" class="btn btn-outline-secondary" type="button">上一月</button>
        <h2 id="calendarTitle" class="h4 mb-0"></h2>
        <button id="nextBtn" class="btn btn-outline-secondary" type="button">下一月</button>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered calendar bg-white">
          <thead class="table-secondary">
            <tr>
              <th class="sun">日</th>
              <th>一</th>
              <th>二</th>
              <th>三</th>
              <th>四</th>
              <th>五</th>
              <th class="sat">六</th>
            </tr>
          </thead>
          <tbody id="calendarBody"></tbody>
        </table>
      </div>

      <div class="text-center">
        <button id="todayBtn" class="btn btn-primary" type="button">回到今天</button>
      </div>
    </section>

    <section id="videoSection">
      <h2 class="h4 mb-3">未排日期影片</h2>
      <div id="trainingList" class="row g-3"></div>
    </section>
  </main>

  <div class="modal fade" id="dayModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="dayModalTitle" class="modal-title"></h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div id="dayModalBody" class="modal-body"></div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">系統訊息</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div id="toastBody" class="toast-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loadNotes, loadVideos } from "./js/firestore-service.js";

    const state = {
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      today: new Date(),
      videos: [],
      notes: [],
      byDate: {}
    };
    const dayModal = new bootstrap.Modal(document.getElementById("dayModal"));
    const toast = new bootstrap.Toast(document.getElementById("appToast"));

    function showToast(message) {
      document.getElementById("toastBody").textContent = message;
      toast.show();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (match) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function toDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function normalizeDateKey(value) {
      if (!value) return "";
      if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return toDateKey(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function normalizeToWatchUrl(url) {
      const text = String(url || "");
      const embedMatch = text.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]+)/);
      if (embedMatch) return `https://www.youtube.com/watch?v=${embedMatch[1]}`;

      const shortMatch = text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (shortMatch) return `https://www.youtube.com/watch?v=${shortMatch[1]}`;

      return text;
    }

    function normalizeToEmbedUrl(url) {
      const text = String(url || "");
      if (text.includes("youtube.com/embed/")) return text;

      const watchMatch = text.match(/v=([a-zA-Z0-9_-]+)/);
      if (watchMatch) return `https://www.youtube.com/embed/${watchMatch[1]}`;

      const shortMatch = text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
      if (shortMatch) return `https://www.youtube.com/embed/${shortMatch[1]}`;

      return text;
    }

    function getVideoTitle(video) {
      return video.title || video.name || "未命名影片";
    }

    function groupByDate() {
      const output = {};

      for (const video of state.videos) {
        const date = normalizeDateKey(video.date);
        if (!date) continue;
        (output[date] ||= []).push({ type: "video", ...video });
      }

      for (const note of state.notes) {
        const date = normalizeDateKey(note.date);
        if (!date) continue;
        (output[date] ||= []).push({ type: "note", ...note });
      }

      state.byDate = output;
    }

    function renderCalendar() {
      document.getElementById("calendarTitle").textContent = `${state.year} 年 ${state.month + 1} 月`;
      const body = document.getElementById("calendarBody");
      const firstDay = new Date(state.year, state.month, 1).getDay();
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();

      let html = "<tr>";
      for (let index = 0; index < firstDay; index++) html += "<td></td>";

      for (let day = 1; day <= daysInMonth; day++) {
        const weekday = new Date(state.year, state.month, day).getDay();
        const key = toDateKey(state.year, state.month, day);
        const items = state.byDate[key] || [];
        const videos = items.filter((item) => item.type === "video");
        const notes = items.filter((item) => item.type === "note");
        const isToday = state.year === state.today.getFullYear()
          && state.month === state.today.getMonth()
          && day === state.today.getDate();

        let className = "day-cell";
        if (weekday === 0) className += " sun";
        if (weekday === 6) className += " sat";
        if (isToday) className += " today";

        const videoText = videos.length
          ? `<div class="event-text">${videos.slice(0, 2).map((video) => escapeHtml(getVideoTitle(video))).join("<br>")}</div>`
          : "";
        const noteText = notes.length
          ? `<div class="note-text">${notes.slice(0, 1).map((note) => escapeHtml(note.title || note.content)).join("<br>")}</div>`
          : "";

        html += `
          <td class="${className}" data-date="${key}">
            <div class="fw-bold">${day}</div>
            ${videoText}
            ${noteText}
          </td>
        `;

        if (weekday === 6 && day !== daysInMonth) html += "</tr><tr>";
      }

      const lastDay = new Date(state.year, state.month, daysInMonth).getDay();
      for (let index = lastDay; index < 6; index++) html += "<td></td>";

      body.innerHTML = `${html}</tr>`;
    }

    function renderTrainingSection() {
      const list = document.getElementById("trainingList");
      const undated = state.videos.filter((video) => !normalizeDateKey(video.date));

      if (!undated.length) {
        list.innerHTML = '<div class="col-12"><div class="alert alert-success">目前沒有未排日期影片。</div></div>';
        return;
      }

      list.innerHTML = undated.map((video, index) => `
        <div class="col-12 col-md-6">
          <div class="card h-100">
            <div class="card-body">
              <h3 class="h6">${escapeHtml(video.series || "未分類")} | ${escapeHtml(getVideoTitle(video))}</h3>
              <div class="ratio ratio-16x9 mt-3">
                <iframe src="${escapeHtml(normalizeToEmbedUrl(video.url))}" title="Training video ${index + 1}" allowfullscreen></iframe>
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    function openDayModal(date) {
      const items = state.byDate[date] || [];
      if (!items.length) return;

      document.getElementById("dayModalTitle").textContent = date;
      document.getElementById("dayModalBody").innerHTML = items.map((item) => {
        if (item.type === "note") {
          return `<div class="alert alert-primary"><strong>${escapeHtml(item.title || "Note")}</strong><br>${escapeHtml(item.content || "")}</div>`;
        }

        return `
          <div class="border-bottom pb-2 mb-2">
            <div class="fw-semibold">${escapeHtml(getVideoTitle(item))}</div>
            <div class="small text-muted">${escapeHtml(item.series || "")}</div>
            <a href="${escapeHtml(normalizeToWatchUrl(item.url))}" target="_blank" rel="noopener">開啟影片</a>
          </div>
        `;
      }).join("");
      dayModal.show();
    }

    async function initPage() {
      try {
        const [videoResult, noteResult] = await Promise.all([loadVideos(), loadNotes()]);
        state.videos = videoResult.data;
        state.notes = noteResult.data;
        groupByDate();
        renderCalendar();
        renderTrainingSection();

        const fromCache = videoResult.fromCache || noteResult.fromCache;
        document.getElementById("dataStatus").textContent = fromCache ? "使用 localStorage 快取資料。" : "資料來自 Firestore。";
        if (fromCache) showToast("Firestore 讀取失敗，已改用 localStorage 快取。");
      } catch (error) {
        console.error("首頁資料初始化失敗", error);
        showToast("資料載入失敗，請稍後再試。");
      }
    }

    document.getElementById("calendarBody").addEventListener("click", (event) => {
      const cell = event.target.closest("td[data-date]");
      if (cell) openDayModal(cell.dataset.date);
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      state.month -= 1;
      if (state.month < 0) {
        state.month = 11;
        state.year -= 1;
      }
      renderCalendar();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      state.month += 1;
      if (state.month > 11) {
        state.month = 0;
        state.year += 1;
      }
      renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      state.year = state.today.getFullYear();
      state.month = state.today.getMonth();
      renderCalendar();
    });

    initPage();
  </script>
</body>

</html>
