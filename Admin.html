<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>後台管理 | Louis Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --page-bg: #d9edff;
      --panel-bg: #eef7ff;
      --panel-border: #9bc7e4;
      --panel-strong: #bfe1f8;
      --text-main: #19324a;
      --text-muted: #5a7085;
      --blue: #0d6efd;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--page-bg), #eff7ff 72%);
      color: var(--text-main);
      font-size: 15px;
    }

    .app-shell {
      max-width: 1220px;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .panel {
      background: rgba(238, 247, 255, 0.78);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.55) inset;
    }

    .summary-card {
      min-height: 92px;
    }

    .summary-value {
      font-size: 2rem;
      line-height: 1;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      background: #416d91;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .form-control,
    .form-select,
    .btn {
      border-radius: 6px;
    }

    .table {
      --bs-table-bg: transparent;
      --bs-table-hover-bg: rgba(13, 110, 253, 0.08);
      color: var(--text-main);
    }

    .table thead th {
      color: #12243a;
      border-bottom-color: #9fc7de;
      font-weight: 700;
      white-space: nowrap;
    }

    .table tbody tr:nth-child(odd) {
      background: rgba(180, 214, 239, 0.45);
    }

    .truncate-cell {
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .table-fixed-actions {
      width: 160px;
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) minmax(180px, 260px) minmax(180px, 260px);
      gap: 10px;
    }

    @media (max-width: 768px) {
      .toolbar-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container-fluid app-shell px-3 px-lg-4 py-4">
    <header class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
      <div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
          <h1 class="h3 mb-0">學習影片與筆記管理</h1>
          <span id="sourceBadge" class="status-pill">尚未載入</span>
        </div>
        <p id="adminStatus" class="text-secondary mb-0">正在檢查登入狀態...</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="index.html">前台</a>
        <button id="logoutBtn" class="btn btn-outline-danger" type="button">登出</button>
      </div>
    </header>

    <section class="row g-3 mb-3" aria-label="統計資料">
      <div class="col-6 col-lg-3">
        <div class="panel summary-card p-3">
          <div class="text-secondary small">影片總數</div>
          <div id="totalVideosCount" class="summary-value fw-bold">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="panel summary-card p-3">
          <div class="text-secondary small">已完成影片</div>
          <div id="completedVideosCount" class="summary-value fw-bold text-success">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="panel summary-card p-3">
          <div class="text-secondary small">未完成影片</div>
          <div id="unfinishedVideosCount" class="summary-value fw-bold text-warning">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="panel summary-card p-3">
          <div class="text-secondary small">筆記數量</div>
          <div id="notesCount" class="summary-value fw-bold text-primary">0</div>
        </div>
      </div>
    </section>

    <section class="panel p-3 mb-3">
      <div class="d-flex flex-wrap gap-2">
        <button id="reloadBtn" class="btn btn-primary" type="button">重新載入</button>
        <button id="exportBtn" class="btn btn-outline-success" type="button">匯出資料</button>
        <button id="toggleImportBtn" class="btn btn-outline-dark" type="button">匯入資料</button>
        <button id="importSampleBtn" class="btn btn-outline-primary" type="button">匯入內建舊資料</button>
        <button id="settingsBtn" class="btn btn-outline-secondary" type="button">初始化網站設定</button>
        <span id="importBadge" class="badge text-bg-secondary align-self-center">匯入待命</span>
      </div>

      <div id="importBox" class="mt-3 d-none">
        <label class="form-label" for="importText">貼上 JSON 資料</label>
        <textarea id="importText" class="form-control mono" rows="8" placeholder='{"videos": [], "notes": []}'></textarea>
        <div class="d-flex flex-wrap gap-2 mt-3">
          <button id="importBtn" class="btn btn-danger" type="button">匯入到 Firestore</button>
          <button id="cancelImportBtn" class="btn btn-outline-secondary" type="button">取消</button>
        </div>
      </div>
    </section>

    <section class="panel p-3 mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h2 class="h5 mb-0">日曆筆記（多列）</h2>
        <button id="addNoteBtn" class="btn btn-sm btn-outline-primary" type="button">新增筆記</button>
      </div>
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th style="width: 120px;">序號</th>
              <th style="width: 190px;">日期</th>
              <th>筆記</th>
              <th class="table-fixed-actions">操作</th>
            </tr>
          </thead>
          <tbody id="notesTbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel p-3 mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h2 class="h5 mb-0">學習影片</h2>
        <button id="addVideoBtn" class="btn btn-sm btn-outline-primary" type="button">新增影片</button>
      </div>

      <div class="toolbar-grid mb-3">
        <input id="searchText" class="form-control" placeholder="搜尋集數 / 標題 / 網址 / 日期">
        <select id="dateFilter" class="form-select">
          <option value="all">全部日期</option>
          <option value="dated">已有日期</option>
          <option value="undated">未排日期</option>
        </select>
        <select id="statusFilter" class="form-select">
          <option value="all">全部狀態</option>
          <option value="planned">未開始</option>
          <option value="watching">觀看中</option>
          <option value="completed">已完成</option>
        </select>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead>
            <tr>
              <th style="width: 110px;">集數</th>
              <th>影片名稱</th>
              <th style="width: 150px;">日期</th>
              <th style="width: 120px;">狀態</th>
              <th style="width: 90px;">進度</th>
              <th class="table-fixed-actions">操作</th>
            </tr>
          </thead>
          <tbody id="videosTbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="noteModalTitle" class="modal-title">新增筆記</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input id="noteId" type="hidden">
          <label class="form-label" for="noteDate">日期</label>
          <input id="noteDate" class="form-control mono" placeholder="2026-06-17">
          <label class="form-label mt-2" for="noteTitle">標題</label>
          <input id="noteTitle" class="form-control" placeholder="日曆筆記">
          <label class="form-label mt-2" for="noteContent">筆記內容</label>
          <textarea id="noteContent" class="form-control" rows="4"></textarea>
        </div>
        <div class="modal-footer">
          <button id="saveNoteBtn" class="btn btn-primary" type="button">儲存</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">取消</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="videoModalTitle" class="modal-title">新增影片</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input id="videoId" type="hidden">
          <div class="row g-2">
            <div class="col-md-4">
              <label class="form-label" for="videoSeries">集數</label>
              <input id="videoSeries" class="form-control">
            </div>
            <div class="col-md-8">
              <label class="form-label" for="videoTitle">影片名稱</label>
              <input id="videoTitle" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoCategory">分類</label>
              <input id="videoCategory" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoDate">日期</label>
              <input id="videoDate" class="form-control mono" placeholder="2026-06-17">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoStatus">狀態</label>
              <select id="videoStatus" class="form-select">
                <option value="planned">未開始</option>
                <option value="watching">觀看中</option>
                <option value="completed">已完成</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="videoProgress">進度</label>
              <input id="videoProgress" class="form-control" type="number" min="0" max="100" value="0">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="videoDuration">片長</label>
              <input id="videoDuration" class="form-control" type="number" min="0" value="0">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoUrl">影片網址</label>
              <input id="videoUrl" class="form-control mono">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoTags">標籤</label>
              <input id="videoTags" class="form-control" placeholder="舊資料, CNC">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoNote">備註</label>
              <textarea id="videoNote" class="form-control" rows="3"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveVideoBtn" class="btn btn-primary" type="button">儲存</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">取消</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">系統訊息</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div id="toastBody" class="toast-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { logout, requireAdmin } from "./js/firebase-auth.js";
    import {
      deleteNote,
      deleteVideo,
      importJsonData,
      loadNotes,
      loadSampleImportData,
      loadSettings,
      loadVideos,
      saveAdminUser,
      saveNote,
      saveSettings,
      saveVideo
    } from "./js/firestore-service.js";

    const state = {
      user: null,
      videos: [],
      notes: [],
      fromCache: false
    };

    const noteModal = new bootstrap.Modal(document.getElementById("noteModal"));
    const videoModal = new bootstrap.Modal(document.getElementById("videoModal"));
    const toast = new bootstrap.Toast(document.getElementById("appToast"));

    function showToast(message) {
      document.getElementById("toastBody").textContent = message;
      toast.show();
    }

    function setBadge(id, text, theme = "secondary") {
      const badge = document.getElementById(id);
      if (!badge) return;
      badge.textContent = text;
      if (id === "sourceBadge") {
        badge.className = "status-pill";
        return;
      }
      badge.className = `badge text-bg-${theme}`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (match) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function toDateInput(value) {
      if (!value) return "";
      if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).trim();
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function clampPercent(value) {
      const number = Number(value || 0);
      if (!Number.isFinite(number)) return 0;
      return Math.min(100, Math.max(0, number));
    }

    function getVideoTitle(video) {
      return video.title || video.name || "";
    }

    function getStatusLabel(status) {
      return {
        planned: "未開始",
        watching: "觀看中",
        completed: "已完成"
      }[status] || status || "未開始";
    }

    function renderDashboard() {
      const totalVideos = state.videos.length;
      const completedVideos = state.videos.filter((video) => video.status === "completed").length;
      document.getElementById("totalVideosCount").textContent = totalVideos;
      document.getElementById("completedVideosCount").textContent = completedVideos;
      document.getElementById("unfinishedVideosCount").textContent = totalVideos - completedVideos;
      document.getElementById("notesCount").textContent = state.notes.length;
    }

    function renderNotes() {
      const tbody = document.getElementById("notesTbody");
      const rows = [...state.notes].sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-secondary py-4">目前沒有筆記。</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map((note, index) => `
        <tr>
          <td class="mono">${escapeHtml(note.rowId || note.id || index + 1)}</td>
          <td class="mono">${escapeHtml(note.date || "")}</td>
          <td class="truncate-cell">${escapeHtml(note.content || note.note || note.title || "")}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" data-edit-note="${escapeHtml(note.id)}">編輯</button>
            <button class="btn btn-sm btn-outline-danger" data-delete-note="${escapeHtml(note.id)}">刪除</button>
          </td>
        </tr>
      `).join("");
    }

    function getFilteredVideos() {
      const queryText = document.getElementById("searchText").value.trim().toLowerCase();
      const dateFilter = document.getElementById("dateFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;

      let videos = [...state.videos];
      if (dateFilter === "dated") videos = videos.filter((video) => video.date);
      if (dateFilter === "undated") videos = videos.filter((video) => !video.date);
      if (statusFilter !== "all") videos = videos.filter((video) => video.status === statusFilter);
      if (queryText) {
        videos = videos.filter((video) => [
          video.series,
          getVideoTitle(video),
          video.category,
          video.url,
          video.date,
          video.status,
          video.note,
          Array.isArray(video.tags) ? video.tags.join(" ") : ""
        ].some((value) => String(value || "").toLowerCase().includes(queryText)));
      }

      return videos.sort((a, b) => String(a.series || "").localeCompare(String(b.series || ""), undefined, { numeric: true }));
    }

    function renderVideos() {
      const tbody = document.getElementById("videosTbody");
      const videos = getFilteredVideos();

      if (!videos.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary py-4">沒有符合條件的影片。</td></tr>';
        return;
      }

      tbody.innerHTML = videos.map((video) => `
        <tr>
          <td class="mono">${escapeHtml(video.series || "")}</td>
          <td class="truncate-cell">${escapeHtml(getVideoTitle(video))}</td>
          <td class="mono">${escapeHtml(video.date || "")}</td>
          <td>${escapeHtml(getStatusLabel(video.status))}</td>
          <td>${clampPercent(video.progress)}%</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" data-edit-video="${escapeHtml(video.id)}">編輯</button>
            <button class="btn btn-sm btn-outline-danger" data-delete-video="${escapeHtml(video.id)}">刪除</button>
          </td>
        </tr>
      `).join("");
    }

    function renderAdmin() {
      renderDashboard();
      renderNotes();
      renderVideos();
      setBadge("sourceBadge", state.fromCache ? "本機備援資料" : "Firestore 已同步", state.fromCache ? "warning" : "success");
    }

    async function loadAllData() {
      try {
        const [videoResult, noteResult] = await Promise.all([loadVideos(), loadNotes(), loadSettings()]);
        state.videos = videoResult.data;
        state.notes = noteResult.data;
        state.fromCache = videoResult.fromCache || noteResult.fromCache;
        renderAdmin();
        showToast(state.fromCache ? "正在使用本機快取或範例資料。" : "已載入 Firestore 資料。");
      } catch (error) {
        console.error("後台資料載入失敗", error);
        setBadge("sourceBadge", "載入失敗", "danger");
        showToast("資料載入失敗，請檢查 Firebase 設定。");
      }
    }

    function openNoteModal(note = null) {
      document.getElementById("noteId").value = note?.id || "";
      document.getElementById("noteDate").value = toDateInput(note?.date || "");
      document.getElementById("noteTitle").value = note?.title || "日曆筆記";
      document.getElementById("noteContent").value = note?.content || note?.note || "";
      document.getElementById("noteModalTitle").textContent = note?.id ? "編輯筆記" : "新增筆記";
      noteModal.show();
    }

    function openVideoModal(video = null) {
      document.getElementById("videoId").value = video?.id || "";
      document.getElementById("videoSeries").value = video?.series || "";
      document.getElementById("videoTitle").value = getVideoTitle(video || {});
      document.getElementById("videoCategory").value = video?.category || "CNC / Manufacturing";
      document.getElementById("videoDate").value = toDateInput(video?.date || "");
      document.getElementById("videoStatus").value = video?.status || "planned";
      document.getElementById("videoProgress").value = clampPercent(video?.progress || 0);
      document.getElementById("videoDuration").value = Number(video?.duration || 0);
      document.getElementById("videoUrl").value = video?.url || "";
      document.getElementById("videoTags").value = Array.isArray(video?.tags) ? video.tags.join(", ") : "";
      document.getElementById("videoNote").value = video?.note || "";
      document.getElementById("videoModalTitle").textContent = video?.id ? "編輯影片" : "新增影片";
      videoModal.show();
    }

    async function handleSaveNote() {
      try {
        await saveNote({
          id: document.getElementById("noteId").value.trim(),
          date: document.getElementById("noteDate").value.trim(),
          title: document.getElementById("noteTitle").value.trim(),
          content: document.getElementById("noteContent").value.trim()
        });
        noteModal.hide();
        await loadAllData();
        showToast("筆記已儲存。");
      } catch (error) {
        console.error("筆記儲存失敗", error);
        showToast("筆記儲存失敗。");
      }
    }

    async function handleSaveVideo() {
      try {
        await saveVideo({
          id: document.getElementById("videoId").value.trim(),
          series: document.getElementById("videoSeries").value.trim(),
          title: document.getElementById("videoTitle").value.trim(),
          category: document.getElementById("videoCategory").value.trim(),
          date: document.getElementById("videoDate").value.trim(),
          status: document.getElementById("videoStatus").value,
          progress: clampPercent(document.getElementById("videoProgress").value),
          duration: document.getElementById("videoDuration").value,
          url: document.getElementById("videoUrl").value.trim(),
          tags: document.getElementById("videoTags").value.split(",").map((tag) => tag.trim()).filter(Boolean),
          note: document.getElementById("videoNote").value.trim()
        });
        videoModal.hide();
        await loadAllData();
        showToast("影片已儲存。");
      } catch (error) {
        console.error("影片儲存失敗", error);
        showToast("影片儲存失敗。");
      }
    }

    function getImportErrorMessage(error) {
      if (error instanceof SyntaxError) return "JSON 格式錯誤，請貼完整 JSON 內容，不是檔案路徑。";
      if (error?.code === "permission-denied") return "Firestore 權限被拒，請先發布安全規則。";
      if (error?.code === "unauthenticated") return "尚未登入或登入狀態失效，請重新登入。";
      if (error?.message) return `匯入失敗：${error.message}`;
      return "匯入失敗，請檢查格式與權限。";
    }

    async function importDataToFirestore(data) {
      setBadge("importBadge", "匯入中", "primary");
      const result = await importJsonData(data);
      document.getElementById("importText").value = "";
      document.getElementById("importBox").classList.add("d-none");
      await loadAllData();
      setBadge("importBadge", `已匯入 ${result.videos} / ${result.notes}`, "success");
      showToast(`已匯入 Firestore：${result.videos} 支影片、${result.notes} 則筆記。`);
    }

    async function handleImportJson() {
      try {
        const raw = document.getElementById("importText").value.trim();
        if (!raw) {
          showToast("請先貼上 JSON。");
          return;
        }
        await importDataToFirestore(JSON.parse(raw));
      } catch (error) {
        console.error("JSON 匯入失敗", error);
        setBadge("importBadge", "匯入失敗", "danger");
        showToast(getImportErrorMessage(error));
      }
    }

    async function handleImportSampleJson() {
      try {
        await importDataToFirestore(await loadSampleImportData());
      } catch (error) {
        console.error("內建舊資料匯入失敗", error);
        setBadge("importBadge", "匯入失敗", "danger");
        showToast(getImportErrorMessage(error));
      }
    }

    function exportJson() {
      try {
        const data = JSON.stringify({ videos: state.videos, notes: state.notes }, null, 2);
        navigator.clipboard.writeText(data)
          .then(() => showToast("JSON 已複製到剪貼簿。"))
          .catch(() => {
            document.getElementById("importText").value = data;
            document.getElementById("importBox").classList.remove("d-none");
            showToast("剪貼簿不可用，已將 JSON 放到匯入區。");
          });
      } catch (error) {
        console.error("JSON 匯出失敗", error);
        showToast("JSON 匯出失敗。");
      }
    }

    async function verifyAdminAccess() {
      try {
        if (!state.user) throw new Error("尚未登入");
        await saveAdminUser(state.user);
      } catch (error) {
        console.error("Firebase 管理員權限檢查失敗", error);
        showToast(getImportErrorMessage(error));
      }
    }

    async function initAdmin() {
      try {
        const user = await requireAdmin();
        if (!user) return;

        state.user = user;
        document.getElementById("adminStatus").textContent = `已登入：${user.email}`;
        await verifyAdminAccess();
        await loadAllData();
      } catch (error) {
        console.error("後台初始化失敗", error);
        showToast("後台初始化失敗，請檢查 Firebase 設定。");
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await logout();
        window.location.href = "login.html";
      } catch (error) {
        console.error("登出失敗", error);
        showToast("登出失敗。");
      }
    });

    document.getElementById("reloadBtn").addEventListener("click", loadAllData);
    document.getElementById("exportBtn").addEventListener("click", exportJson);
    document.getElementById("toggleImportBtn").addEventListener("click", () => document.getElementById("importBox").classList.toggle("d-none"));
    document.getElementById("cancelImportBtn").addEventListener("click", () => document.getElementById("importBox").classList.add("d-none"));
    document.getElementById("importBtn").addEventListener("click", handleImportJson);
    document.getElementById("importSampleBtn").addEventListener("click", handleImportSampleJson);
    document.getElementById("settingsBtn").addEventListener("click", async () => {
      try {
        await saveSettings({ siteName: "Louis Study Tracker", theme: "light", calendarStartDay: 1 });
        showToast("網站設定已初始化。");
      } catch (error) {
        console.error("網站設定初始化失敗", error);
        showToast("網站設定初始化失敗。");
      }
    });
    document.getElementById("addNoteBtn").addEventListener("click", () => openNoteModal());
    document.getElementById("addVideoBtn").addEventListener("click", () => openVideoModal());
    document.getElementById("saveNoteBtn").addEventListener("click", handleSaveNote);
    document.getElementById("saveVideoBtn").addEventListener("click", handleSaveVideo);
    document.getElementById("searchText").addEventListener("input", renderVideos);
    document.getElementById("dateFilter").addEventListener("change", renderVideos);
    document.getElementById("statusFilter").addEventListener("change", renderVideos);

    document.getElementById("notesTbody").addEventListener("click", async (event) => {
      const editId = event.target.dataset.editNote;
      const deleteId = event.target.dataset.deleteNote;
      if (editId) openNoteModal(state.notes.find((note) => note.id === editId));
      if (deleteId && confirm("確定要刪除這筆筆記？")) {
        try {
          await deleteNote(deleteId);
          await loadAllData();
          showToast("筆記已刪除。");
        } catch (error) {
          console.error("筆記刪除失敗", error);
          showToast("筆記刪除失敗。");
        }
      }
    });

    document.getElementById("videosTbody").addEventListener("click", async (event) => {
      const editId = event.target.dataset.editVideo;
      const deleteId = event.target.dataset.deleteVideo;
      if (editId) openVideoModal(state.videos.find((video) => video.id === editId));
      if (deleteId && confirm("確定要刪除這支影片？")) {
        try {
          await deleteVideo(deleteId);
          await loadAllData();
          showToast("影片已刪除。");
        } catch (error) {
          console.error("影片刪除失敗", error);
          showToast("影片刪除失敗。");
        }
      }
    });

    initAdmin();
  </script>
</body>

</html>
