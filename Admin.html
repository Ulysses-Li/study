<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | Louis Study Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .summary-card {
      min-height: 104px;
    }

    .summary-value {
      font-size: 2rem;
      line-height: 1;
    }

    .table td {
      vertical-align: middle;
    }

    .table-fixed-actions {
      width: 160px;
    }
  </style>
</head>

<body>
  <main class="container-fluid px-3 px-lg-4 py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
      <div>
        <h1 class="h3 mb-1">Study Admin</h1>
        <p id="adminStatus" class="text-muted mb-0">檢查登入狀態中...</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="index.html">回首頁</a>
        <button id="logoutBtn" class="btn btn-outline-danger" type="button">登出</button>
      </div>
    </div>

    <section class="row g-3 mb-4" aria-label="Dashboard">
      <div class="col-6 col-lg-3">
        <div class="card summary-card">
          <div class="card-body">
            <div class="text-muted small">總影片數</div>
            <div id="totalVideosCount" class="summary-value fw-bold">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card summary-card">
          <div class="card-body">
            <div class="text-muted small">完成影片數</div>
            <div id="completedVideosCount" class="summary-value fw-bold text-success">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card summary-card">
          <div class="card-body">
            <div class="text-muted small">未完成影片數</div>
            <div id="unfinishedVideosCount" class="summary-value fw-bold text-warning">0</div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card summary-card">
          <div class="card-body">
            <div class="text-muted small">筆記數量</div>
            <div id="notesCount" class="summary-value fw-bold text-primary">0</div>
          </div>
        </div>
      </div>
    </section>

    <div class="d-flex flex-wrap gap-2 mb-4">
      <button id="reloadBtn" class="btn btn-primary" type="button">重新載入</button>
      <button id="exportBtn" class="btn btn-outline-success" type="button">匯出 JSON</button>
      <button id="toggleImportBtn" class="btn btn-outline-dark" type="button">匯入 JSON</button>
      <button id="settingsBtn" class="btn btn-outline-secondary" type="button">建立 settings</button>
    </div>

    <section id="importBox" class="card mb-4 d-none">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h2 class="h5 mb-0">JSON 匯入</h2>
          <button id="cancelImportBtn" class="btn btn-sm btn-outline-secondary" type="button">關閉</button>
        </div>
        <textarea id="importText" class="form-control mono" rows="8" placeholder='{"videos": [], "notes": []}'></textarea>
        <div class="d-flex gap-2 mt-3">
          <button id="importBtn" class="btn btn-danger" type="button">匯入 Firestore</button>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <h2 class="h5 mb-0">Videos CRUD</h2>
          <button id="addVideoBtn" class="btn btn-sm btn-outline-primary" type="button">新增影片</button>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-12 col-lg-6">
            <input id="searchText" class="form-control" placeholder="搜尋 title / series / category / url / date">
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <select id="dateFilter" class="form-select">
              <option value="all">全部日期</option>
              <option value="dated">有日期</option>
              <option value="undated">未排日期</option>
            </select>
          </div>
          <div class="col-12 col-sm-6 col-lg-3">
            <select id="statusFilter" class="form-select">
              <option value="all">全部狀態</option>
              <option value="planned">planned</option>
              <option value="watching">watching</option>
              <option value="completed">completed</option>
            </select>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead>
              <tr>
                <th style="width: 120px;">series</th>
                <th>title</th>
                <th style="width: 130px;">category</th>
                <th style="width: 130px;">date</th>
                <th style="width: 120px;">status</th>
                <th style="width: 90px;">progress</th>
                <th class="table-fixed-actions">操作</th>
              </tr>
            </thead>
            <tbody id="videosTbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
          <h2 class="h5 mb-0">Notes CRUD</h2>
          <button id="addNoteBtn" class="btn btn-sm btn-outline-primary" type="button">新增 Note</button>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-striped align-middle">
            <thead>
              <tr>
                <th style="width: 140px;">date</th>
                <th style="width: 220px;">title</th>
                <th>content</th>
                <th class="table-fixed-actions">操作</th>
              </tr>
            </thead>
            <tbody id="notesTbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="noteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="noteModalTitle" class="modal-title">新增 Note</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input id="noteId" type="hidden">
          <label class="form-label" for="noteDate">date</label>
          <input id="noteDate" class="form-control mono" placeholder="2026-06-17">
          <label class="form-label mt-2" for="noteTitle">title</label>
          <input id="noteTitle" class="form-control" placeholder="學習筆記">
          <label class="form-label mt-2" for="noteContent">content</label>
          <textarea id="noteContent" class="form-control" rows="4"></textarea>
        </div>
        <div class="modal-footer">
          <button id="saveNoteBtn" class="btn btn-primary" type="button">儲存</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">取消</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 id="videoModalTitle" class="modal-title">新增影片</h5>
          <button class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input id="videoId" type="hidden">
          <div class="row g-2">
            <div class="col-md-4">
              <label class="form-label" for="videoSeries">series</label>
              <input id="videoSeries" class="form-control">
            </div>
            <div class="col-md-8">
              <label class="form-label" for="videoTitle">title</label>
              <input id="videoTitle" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoCategory">category</label>
              <input id="videoCategory" class="form-control">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoDate">date</label>
              <input id="videoDate" class="form-control mono" placeholder="2026-06-17">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="videoStatus">status</label>
              <select id="videoStatus" class="form-select">
                <option value="planned">planned</option>
                <option value="watching">watching</option>
                <option value="completed">completed</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="videoProgress">progress</label>
              <input id="videoProgress" class="form-control" type="number" min="0" max="100" value="0">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="videoDuration">duration</label>
              <input id="videoDuration" class="form-control" type="number" min="0" value="0">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoUrl">url</label>
              <input id="videoUrl" class="form-control mono">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoTags">tags</label>
              <input id="videoTags" class="form-control" placeholder="Firebase, Firestore">
            </div>
            <div class="col-12">
              <label class="form-label" for="videoNote">note</label>
              <textarea id="videoNote" class="form-control" rows="3"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveVideoBtn" class="btn btn-primary" type="button">儲存</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">取消</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header">
        <strong class="me-auto">系統訊息</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
      <div id="toastBody" class="toast-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { logout, requireAdmin } from "./js/firebase-auth.js";
    import {
      deleteNote,
      deleteVideo,
      importJsonData,
      loadNotes,
      loadSettings,
      loadVideos,
      saveAdminUser,
      saveNote,
      saveSettings,
      saveVideo
    } from "./js/firestore-service.js";

    const state = {
      user: null,
      videos: [],
      notes: []
    };
    const noteModal = new bootstrap.Modal(document.getElementById("noteModal"));
    const videoModal = new bootstrap.Modal(document.getElementById("videoModal"));
    const toast = new bootstrap.Toast(document.getElementById("appToast"));

    function showToast(message) {
      document.getElementById("toastBody").textContent = message;
      toast.show();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (match) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[match]));
    }

    function toDateInput(value) {
      if (!value) return "";
      if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).trim();
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getVideoTitle(video) {
      return video.title || video.name || "";
    }

    function getCompletedVideos() {
      return state.videos.filter((video) => video.status === "completed");
    }

    /**
     * 更新 Dashboard 統計資料。
     *
     * 輸入：
     * state.videos、state.notes
     *
     * 輸出：
     * 更新總影片數、完成影片數、未完成影片數、筆記數量
     *
     * 流程：
     * 1. 計算影片總數
     * 2. 計算 status 為 completed 的影片
     * 3. 計算未完成影片
     * 4. 寫入 Dashboard 卡片
     */
    function renderDashboard() {
      const totalVideos = state.videos.length;
      const completedVideos = getCompletedVideos().length;
      const unfinishedVideos = totalVideos - completedVideos;

      document.getElementById("totalVideosCount").textContent = totalVideos;
      document.getElementById("completedVideosCount").textContent = completedVideos;
      document.getElementById("unfinishedVideosCount").textContent = unfinishedVideos;
      document.getElementById("notesCount").textContent = state.notes.length;
    }

    function renderNotes() {
      const tbody = document.getElementById("notesTbody");
      const rows = [...state.notes].sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">目前沒有筆記。</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map((note) => `
        <tr>
          <td class="mono">${escapeHtml(note.date || "")}</td>
          <td>${escapeHtml(note.title || "")}</td>
          <td>${escapeHtml(note.content || "")}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" data-edit-note="${escapeHtml(note.id)}">編輯</button>
            <button class="btn btn-sm btn-outline-danger" data-delete-note="${escapeHtml(note.id)}">刪除</button>
          </td>
        </tr>
      `).join("");
    }

    function getFilteredVideos() {
      const queryText = document.getElementById("searchText").value.trim().toLowerCase();
      const dateFilter = document.getElementById("dateFilter").value;
      const statusFilter = document.getElementById("statusFilter").value;

      let videos = [...state.videos];
      if (dateFilter === "dated") videos = videos.filter((video) => video.date);
      if (dateFilter === "undated") videos = videos.filter((video) => !video.date);
      if (statusFilter !== "all") videos = videos.filter((video) => video.status === statusFilter);
      if (queryText) {
        videos = videos.filter((video) => [
          video.series,
          getVideoTitle(video),
          video.category,
          video.url,
          video.date,
          video.status
        ].some((value) => String(value || "").toLowerCase().includes(queryText)));
      }

      return videos.sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));
    }

    function renderVideos() {
      const tbody = document.getElementById("videosTbody");
      const videos = getFilteredVideos();

      if (!videos.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">沒有符合條件的影片。</td></tr>';
        return;
      }

      tbody.innerHTML = videos.map((video) => `
        <tr>
          <td>${escapeHtml(video.series || "")}</td>
          <td>${escapeHtml(getVideoTitle(video))}</td>
          <td>${escapeHtml(video.category || "")}</td>
          <td class="mono">${escapeHtml(video.date || "")}</td>
          <td>${escapeHtml(video.status || "")}</td>
          <td>${Number(video.progress || 0)}%</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary" data-edit-video="${escapeHtml(video.id)}">編輯</button>
            <button class="btn btn-sm btn-outline-danger" data-delete-video="${escapeHtml(video.id)}">刪除</button>
          </td>
        </tr>
      `).join("");
    }

    function renderAdmin() {
      renderDashboard();
      renderVideos();
      renderNotes();
    }

    async function loadAllData() {
      try {
        const [videoResult, noteResult] = await Promise.all([loadVideos(), loadNotes(), loadSettings()]);
        state.videos = videoResult.data;
        state.notes = noteResult.data;
        renderAdmin();

        const fromCache = videoResult.fromCache || noteResult.fromCache;
        showToast(fromCache ? "已載入 localStorage 快取資料。" : "已載入 Firestore 資料。");
      } catch (error) {
        console.error("Admin 資料載入失敗", error);
        showToast("資料載入失敗，請稍後再試。");
      }
    }

    function openNoteModal(note = null) {
      document.getElementById("noteId").value = note?.id || "";
      document.getElementById("noteDate").value = toDateInput(note?.date || "");
      document.getElementById("noteTitle").value = note?.title || "";
      document.getElementById("noteContent").value = note?.content || "";
      document.getElementById("noteModalTitle").textContent = note?.id ? "編輯 Note" : "新增 Note";
      noteModal.show();
    }

    function openVideoModal(video = null) {
      document.getElementById("videoId").value = video?.id || "";
      document.getElementById("videoSeries").value = video?.series || "";
      document.getElementById("videoTitle").value = getVideoTitle(video || {});
      document.getElementById("videoCategory").value = video?.category || "";
      document.getElementById("videoDate").value = toDateInput(video?.date || "");
      document.getElementById("videoStatus").value = video?.status || "planned";
      document.getElementById("videoProgress").value = Number(video?.progress || 0);
      document.getElementById("videoDuration").value = Number(video?.duration || 0);
      document.getElementById("videoUrl").value = video?.url || "";
      document.getElementById("videoTags").value = Array.isArray(video?.tags) ? video.tags.join(", ") : "";
      document.getElementById("videoNote").value = video?.note || "";
      document.getElementById("videoModalTitle").textContent = video?.id ? "編輯影片" : "新增影片";
      videoModal.show();
    }

    async function handleSaveNote() {
      try {
        await saveNote({
          id: document.getElementById("noteId").value.trim(),
          date: document.getElementById("noteDate").value.trim(),
          title: document.getElementById("noteTitle").value.trim(),
          content: document.getElementById("noteContent").value.trim()
        });
        noteModal.hide();
        await loadAllData();
        showToast("Note 已儲存。");
      } catch (error) {
        console.error("Note 儲存失敗", error);
        showToast("Note 儲存失敗。");
      }
    }

    async function handleSaveVideo() {
      try {
        await saveVideo({
          id: document.getElementById("videoId").value.trim(),
          series: document.getElementById("videoSeries").value.trim(),
          title: document.getElementById("videoTitle").value.trim(),
          category: document.getElementById("videoCategory").value.trim(),
          date: document.getElementById("videoDate").value.trim(),
          status: document.getElementById("videoStatus").value,
          progress: document.getElementById("videoProgress").value,
          duration: document.getElementById("videoDuration").value,
          url: document.getElementById("videoUrl").value.trim(),
          tags: document.getElementById("videoTags").value.split(",").map((tag) => tag.trim()).filter(Boolean),
          note: document.getElementById("videoNote").value.trim()
        });
        videoModal.hide();
        await loadAllData();
        showToast("影片已儲存。");
      } catch (error) {
        console.error("影片儲存失敗", error);
        showToast("影片儲存失敗。");
      }
    }

    async function handleImportJson() {
      try {
        const raw = document.getElementById("importText").value.trim();
        if (!raw) {
          showToast("請先貼上 JSON。");
          return;
        }

        const data = JSON.parse(raw);
        await importJsonData(data);
        document.getElementById("importText").value = "";
        document.getElementById("importBox").classList.add("d-none");
        await loadAllData();
        showToast("JSON 已匯入 Firestore。");
      } catch (error) {
        console.error("JSON 匯入失敗", error);
        showToast("JSON 匯入失敗，請檢查格式。");
      }
    }

    function exportJson() {
      try {
        const data = JSON.stringify({ videos: state.videos, notes: state.notes }, null, 2);
        navigator.clipboard.writeText(data)
          .then(() => showToast("JSON 已複製到剪貼簿。"))
          .catch(() => {
            document.getElementById("importText").value = data;
            document.getElementById("importBox").classList.remove("d-none");
            showToast("剪貼簿不可用，已將 JSON 放入匯入欄位。");
          });
      } catch (error) {
        console.error("JSON 匯出失敗", error);
        showToast("JSON 匯出失敗。");
      }
    }

    async function initAdmin() {
      try {
        const user = await requireAdmin();
        if (!user) return;

        state.user = user;
        document.getElementById("adminStatus").textContent = `已登入：${user.email}`;
        try {
          await saveAdminUser(user);
        } catch (error) {
          // users collection 可能依安全規則只能由 Firebase Console 建立，失敗不阻斷 Admin 使用。
          console.error("users/admin 文件建立失敗，請確認 Firestore Rules", error);
        }
        await loadAllData();
      } catch (error) {
        console.error("Admin 初始化失敗", error);
        showToast("Admin 初始化失敗，請確認 Firebase 設定。");
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await logout();
        window.location.href = "login.html";
      } catch (error) {
        console.error("登出失敗", error);
        showToast("登出失敗。");
      }
    });

    document.getElementById("reloadBtn").addEventListener("click", loadAllData);
    document.getElementById("exportBtn").addEventListener("click", exportJson);
    document.getElementById("toggleImportBtn").addEventListener("click", () => document.getElementById("importBox").classList.toggle("d-none"));
    document.getElementById("cancelImportBtn").addEventListener("click", () => document.getElementById("importBox").classList.add("d-none"));
    document.getElementById("importBtn").addEventListener("click", handleImportJson);
    document.getElementById("settingsBtn").addEventListener("click", async () => {
      try {
        await saveSettings({ siteName: "Louis Study Tracker", theme: "light", calendarStartDay: 1 });
        showToast("settings/main 已建立或更新。");
      } catch (error) {
        console.error("settings 建立失敗", error);
        showToast("settings 建立失敗。");
      }
    });
    document.getElementById("addNoteBtn").addEventListener("click", () => openNoteModal());
    document.getElementById("addVideoBtn").addEventListener("click", () => openVideoModal());
    document.getElementById("saveNoteBtn").addEventListener("click", handleSaveNote);
    document.getElementById("saveVideoBtn").addEventListener("click", handleSaveVideo);
    document.getElementById("searchText").addEventListener("input", renderVideos);
    document.getElementById("dateFilter").addEventListener("change", renderVideos);
    document.getElementById("statusFilter").addEventListener("change", renderVideos);

    document.getElementById("notesTbody").addEventListener("click", async (event) => {
      const editId = event.target.dataset.editNote;
      const deleteId = event.target.dataset.deleteNote;

      if (editId) openNoteModal(state.notes.find((note) => note.id === editId));
      if (deleteId && confirm("確定刪除此 Note？")) {
        try {
          await deleteNote(deleteId);
          await loadAllData();
          showToast("Note 已刪除。");
        } catch (error) {
          console.error("Note 刪除失敗", error);
          showToast("Note 刪除失敗。");
        }
      }
    });

    document.getElementById("videosTbody").addEventListener("click", async (event) => {
      const editId = event.target.dataset.editVideo;
      const deleteId = event.target.dataset.deleteVideo;

      if (editId) openVideoModal(state.videos.find((video) => video.id === editId));
      if (deleteId && confirm("確定刪除此影片？")) {
        try {
          await deleteVideo(deleteId);
          await loadAllData();
          showToast("影片已刪除。");
        } catch (error) {
          console.error("影片刪除失敗", error);
          showToast("影片刪除失敗。");
        }
      }
    });

    initAdmin();
  </script>
